[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=40
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    demo: Demo mode tests
    websocket: WebSocket tests
